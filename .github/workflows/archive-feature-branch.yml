name: archive-feature-branch

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  archive-feature-branch:
    if: startsWith(github.head_ref, 'feature/') && ${{ github.event.pull_request.merged }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Create archive ref
        run: |
          git update-ref "refs/archive/${{ github.head_ref }}" "${{ github.head_ref }}"
          git push origin refs/archive/*:refs/archive/*

      - name: Delete feature branch
        run: git push -d origin "${{ github.head_ref }}"