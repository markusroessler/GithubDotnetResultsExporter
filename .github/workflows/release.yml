name: Release Build

on: 
  workflow_dispatch:
    inputs:
      release-version:
        description: 'Version to release'
        required: true
        default: ''

permissions:
  contents: write
  packages: write
  checks: write
  pull-requests: write # for EnricoMi/publish-unit-test-result-action

jobs:
  release:
    name: Release ${{ inputs.release-version }}
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET Core SDK 7.0.x
      uses: actions/setup-dotnet@v2
      with:
        dotnet-version: '7.0.x'

    - name: Init nuget source
      run: dotnet nuget add source --username markusroessler --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/markusroessler/index.json"

    - name: Init nuget cache
      uses: actions/cache@v3
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Git Config
      run: |
        git config --global user.name 'Github Actions'
        git config --global user.email 'github.actions@users.noreply.github.com'

    - name: Create Tag
      run: |
        git tag -a ${{ inputs.release-version }} -m "Release ${{ inputs.release-version }} [skip ci]"
        git push origin ${{ inputs.release-version }}

    - name: Build
      id: build
      run: |
        dotnet build -p:Configuration=Release -p:ErrorLog="compiler-diagnostics.sarif%2Cversion=2.1"

    - name: Test
      if: always()
      run: dotnet test -p:Configuration=Release --logger:html --logger:"trx;LogFileName=TestResults/TestResults.trx" --no-build

    - name: Pack nuget package
      run: dotnet pack GithubSarifCollector.Csl -p:Configuration=Release -p:Version=${{ inputs.release-version }}

    - name: Push nuget package
      run: dotnet nuget push GithubSarifCollector.Csl/bin/Release/GithubSarifCollector.${{ inputs.release-version }}.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source "github"

    - name: Install dotnet tools
      if: always()
      run: |
        dotnet tool install --global GithubSarifCollector --version ${{ inputs.release-version }}
    
    - name: Publish Github Release
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ inputs.release-version }}
        artifacts: GithubSarifCollector.Csl/bin/Release/GithubSarifCollector.${{ inputs.release-version }}.nupkg
        generateReleaseNotes: true
        draft: false

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: GithubSarifCollector-ci-quick-test-report
        path: '**/TestResults/*.html'

    - name: Publish Unit Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: "**/TestResults/TestResults.trx"
        check_name: "Test Results"
        check_run_annotations_branch: "*"

    - name: Collect Build Results
      id: collect-build-results
      if: always()
      run: collect-sarifs-for-checkrun --github-server-url ${{ github.server_url }} --github-repo ${{ github.repository }} --github-ref-name ${{ github.ref_name }}

    - name: Publish Build Results
      uses: LouisBrunner/checks-action@v1.6.1
      if: always()
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        name: "Build Results"
        conclusion: ${{ steps.collect-build-results.outputs.checks-action-conclusion }}
        output: ${{ steps.collect-build-results.outputs.checks-action-output }}
        annotations: ${{ steps.collect-build-results.outputs.checks-action-annotations }}
