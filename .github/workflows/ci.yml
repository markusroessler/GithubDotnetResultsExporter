name: CI Build

on: 
  push: 
  workflow_dispatch:

permissions:
  contents: write
  checks: write
  packages: read
  pull-requests: write # for EnricoMi/publish-unit-test-result-action

jobs:
  build-and-test:
    name: Build-Job
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET Core SDK 7.0.x
      uses: actions/setup-dotnet@v2
      with:
        dotnet-version: '7.0.x'

    - name: Remove setup-dotnet problem matcher
      run: echo "::remove-matcher owner=csc::"

    - name: Init nuget source
      run: dotnet nuget add source --username markusroessler --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/markusroessler/index.json"

    - name: Init nuget cache
      uses: actions/cache@v3
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Build
      id: build
      run: |
        dotnet build -p:ErrorLog="compiler-diagnostics.sarif%2Cversion=2.1"
    
    - name: Pack nuget package
      if: always()
      run: dotnet pack GithubDotnetResultsExporter.Csl -p:Version=1.0.0-local.1

    - name: Install dotnet tools
      if: always()
      run: |
        dotnet new tool-manifest
        dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.2.0
        dotnet tool install --add-source ./GithubDotnetResultsExporter.Csl/bin/Debug GithubDotnetResultsExporter --version 1.0.0-local.1

    - name: Test
      if: always()
      run: dotnet test --logger:html --logger:"trx;LogFileName=TestResults.trx" --collect:"XPlat Code Coverage" --settings coverlet.runsettings --no-build

    - name: Collect Build Results
      if: always()
      run: dotnet export-dotnet-results-for-github --export-step-summary true --github-server-url ${{ github.server_url }} --github-repo ${{ github.repository }} --github-ref-name ${{ github.ref_name }}

    - name: Generate Coverage Report
      if: always()
      run: reportgenerator
    
    - name: Upload Coverage Report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: GithubDotnetResultsExporter-ci-coverage-report
        path: TestResults/coverage-report

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: GithubDotnetResultsExporter-ci-test-report
        path: '**/TestResults/*.html'

    - name: Publish Coverage Results
      if: always()
      run: | 
        echo "## Coverage Results" >> $GITHUB_STEP_SUMMARY
        cat TestResults/coverage-report/SummaryGithub.md | sed -e 's/# Summary//g' >> $GITHUB_STEP_SUMMARY
