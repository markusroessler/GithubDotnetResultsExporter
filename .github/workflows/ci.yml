name: CI Build

on: 
  push: 
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  build-and-test:
    name: Build-Job
    runs-on: ubuntu-latest

    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET Core SDK 7.0.x
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '7.0.x'
        cache: true
        cache-dependency-path: "*/packages.lock.json"

    - name: Remove setup-dotnet problem matcher
      run: echo "::remove-matcher owner=csc::"

    - name: Init nuget source
      run: dotnet nuget add source --username markusroessler --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/markusroessler/index.json"

    - name: Restore
      run: dotnet restore --locked-mode

    - name: Build
      run: dotnet build --no-restore -p:ErrorLog="compiler-diagnostics.sarif%2Cversion=2.1"
    
    - name: Test
      if: always()
      run: dotnet test --logger:html --logger:"trx;LogFileName=TestResults.trx" --collect:"XPlat Code Coverage" --settings coverlet.runsettings --no-build

    - name: Collect Build Results
      if: always()
      run: dotnet run --project GithubDotnetResultsExporter.Csl -- --export-step-summary true --github-server-url ${{ github.server_url }} --github-repo ${{ github.repository }} --github-ref-name ${{ github.ref_name }} --culture "de-DE"

    - name: Generate Coverage Report
      if: always()
      run: dotnet reportgenerator
    
    - name: Upload Coverage Report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: GithubDotnetResultsExporter-ci-coverage-report
        path: TestResults/coverage-report

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: GithubDotnetResultsExporter-ci-test-report
        path: '**/TestResults/*.html'

    - name: Publish Coverage Results
      if: always()
      run: | 
        echo "## Coverage Results" >> $GITHUB_STEP_SUMMARY
        cat TestResults/coverage-report/SummaryGithub.md | sed -e 's/# Summary//g' >> $GITHUB_STEP_SUMMARY
